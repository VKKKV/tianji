# TianJi source registry example
# Local-first and credential-free: fixtures use checked-in XML files, and the
# disabled remote entry uses example.invalid only.

sources:
  - id: sample_technology
    name: Sample technology fixture
    enabled: true
    tier: primary
    kind: fixture
    path: tests/fixtures/sample_feed.xml
    tags: [technology, demo]

  - id: economy_fixture
    name: Economy fixture
    enabled: true
    tier: secondary
    kind: fixture
    path: tests/fixtures/economy_feed.xml
    tags: [economy, demo]

  - id: disabled_dummy_remote
    name: Disabled dummy remote feed
    enabled: false
    tier: watchlist
    kind: rss
    url: https://example.invalid/feed.xml
    tags: [dummy]
