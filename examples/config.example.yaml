# TianJi example config
# Copy to ~/.tianji/config.yaml and replace provider/env names as needed.
# Do not put raw secrets in this file unless you accept local plaintext storage.

providers:
  ollama_local:
    type: ollama
    model: qwen3:14b
    base_url: http://127.0.0.1:11434
    max_concurrency: 1

  openai_compatible:
    type: openai
    model: gpt-4o
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    max_concurrency: 2
    fallback: ollama_local

agent_model_map:
  forward_default: ollama_local
  backward_coarse: openai_compatible
  backward_fine: ollama_local
