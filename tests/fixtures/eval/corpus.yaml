cases:
  - id: sample_feed_technology_high
    description: Existing sample geopolitical feed should remain technology/high with stable top event.
    fixture: tests/fixtures/sample_feed.xml
    expected:
      schema_version: tianji.run-artifact.v1
      mode: fixture
      raw_item_count: 3
      normalized_event_count: 3
      scored_event_count: 3
      intervention_count: 3
      dominant_field: technology
      risk_level: high
      top_event_id: 1e007871b783bb48
    tolerance:
      score_abs: 0.0
    golden: tests/fixtures/eval/golden/sample_feed_technology_high.json
  - id: economy_feed_economy_high
    description: Focused economic fixture should remain economy/high with stable top trade event.
    fixture: tests/fixtures/economy_feed.xml
    expected:
      schema_version: tianji.run-artifact.v1
      mode: fixture
      raw_item_count: 2
      normalized_event_count: 2
      scored_event_count: 2
      intervention_count: 2
      dominant_field: economy
      risk_level: high
      top_event_id: 2d2c385f295f3e6d
    tolerance:
      score_abs: 0.0
    golden: tests/fixtures/eval/golden/economy_feed_economy_high.json
